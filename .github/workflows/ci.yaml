name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    # Run daily at 2 AM UTC to check for updates
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      addon:
        description: 'Specific addon to build (optional)'
        required: false
        type: string

jobs:
  update-addons:
    runs-on: "ubuntu-latest"
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: "actions/checkout@v4"
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - uses: "actions/setup-python@v4"
        with:
          python-version: "3.11"
      
      - name: "Update add-ons from external repositories"
        run: |
          python scripts/update-addons.py
      
      - name: "Commit changes"
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "Update add-ons from external repositories"
      
      - name: "Push changes"
        run: |
          git push

  lint:
    runs-on: "ubuntu-latest"
    needs: update-addons
    if: always() && (needs.update-addons.result == 'success' || needs.update-addons.result == 'skipped')
    steps:
      - uses: "actions/checkout@v4"
      
      - uses: "actions/setup-python@v4"
        with:
          python-version: "3.11"
      
      - name: "Install dependencies"
        run: |
          pip install yamllint
      
      - name: "Run linter"
        run: |
          yamllint -c .yamllint .

  build:
    runs-on: "ubuntu-latest"
    needs: [update-addons, lint]
    if: always() && (needs.update-addons.result == 'success' || needs.update-addons.result == 'skipped') && needs.lint.result == 'success'
    strategy:
      matrix:
        addon: [chisel]
        include:
          - addon: chisel
            image: ghcr.io/m2sh/chisel
    steps:
      - uses: "actions/checkout@v4"
      
      - uses: "docker/setup-buildx-action@v3"
      
      - name: "Build ${{ matrix.addon }}"
        uses: "docker/build-push-action@v5"
        with:
          context: ./${{ matrix.addon }}
          push: true
          tags: |
            ${{ matrix.image }}:latest
            ${{ matrix.image }}:${{ github.sha }}
          platforms: linux/amd64,linux/arm64,linux/arm/v7,linux/arm/v6,linux/386
          build-args: |
            BUILD_FROM=ghcr.io/hassio-addons/base/amd64:14.0.0
            BUILD_ARCH=amd64
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            BUILD_DESCRIPTION=${{ fromJSON(steps.get-config.outputs.config).addons[matrix.addon].description }}
            BUILD_NAME=${{ fromJSON(steps.get-config.outputs.config).addons[matrix.addon].name }}
            BUILD_REF=${{ github.sha }}
            BUILD_REPOSITORY=${{ github.repository }}
            BUILD_VERSION=${{ fromJSON(steps.get-config.outputs.config).addons[matrix.addon].version }}
      
      - name: "Get addon config"
        id: get-config
        run: |
          echo "config=$(cat addons.json)" >> $GITHUB_OUTPUT 